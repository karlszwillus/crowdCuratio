# For more information: https://laravel.com/docs/sail
services:
  laravel.test:
    build:
      context: ./docker/8.3
      dockerfile: Dockerfile
      args:
        WWWGROUP: '${WWWGROUP:-1000}'
    image: sail-8.3/app
    ports:
      - '${APP_PORT:-8084}:80'
    environment:
      WWWUSER: '${WWWUSER:-1000}'
      LARAVEL_SAIL: 1
    volumes:
      - '.:/var/www/html'
    networks:
      - sail
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
  mysql:
    image: 'mysql:8.0'
    # NF-DOCKER-005: Port nur auf Loopback, nicht auf 0.0.0.0.
    ports:
      - '127.0.0.1:${FORWARD_DB_PORT:-8005}:3306'
    # NF-DOCKER-002: nach Crash automatisch neu starten.
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: '${DB_PASSWORD}'
      MYSQL_DATABASE: '${DB_DATABASE}'
      MYSQL_USER: '${DB_USERNAME}'
      MYSQL_PASSWORD: '${DB_PASSWORD}'
    volumes:
      - 'sailmysql:/var/lib/mysql'
    networks:
      - sail
    # NF-DOCKER-004: mysqladmin ping ohne Credentials gibt unter
    # MySQL 8 ein 'Access denied', das Docker als 'läuft' interpretiert.
    # Echter Healthcheck mit Root-Credentials und expliziten Timings.
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u", "root", "--password=${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
  phpmyadmin:
    networks:
      - sail
    image: 'phpmyadmin:5.2'
    ports:
      - '127.0.0.1:8080:80'
    environment:
      MYSQL_USERNAME: "${DB_USERNAME}"
      MYSQL_ROOT_PASSWORD: "${DB_PASSWORD}"
      PMA_HOST: mysql
  redis:
    image: 'redis:7-alpine'
    # NF-DOCKER-005: Port auf Loopback.
    ports:
      - '127.0.0.1:${FORWARD_REDIS_PORT:-6379}:6379'
    # NF-DOCKER-002.
    restart: unless-stopped
    volumes:
      - 'sailredis:/data'
    networks:
      - sail
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
  meilisearch:
    image: 'getmeili/meilisearch:v1.6'
    # NF-DOCKER-005: Port auf Loopback.
    ports:
      - '127.0.0.1:${FORWARD_MEILISEARCH_PORT:-7700}:7700'
    # NF-DOCKER-002.
    restart: unless-stopped
    volumes:
      - 'sailmeilisearch:/data.ms'
    networks:
      - sail
    # NF-DOCKER-001: Healthcheck gegen die /health-Route.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7700/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
  mailpit:
    image: 'axllent/mailpit:v1.20'
    # SMTP-Port bewusst auf 0.0.0.0:1025 (App-Container muss ihn intern
    # erreichen); Web-Dashboard nur auf Loopback.
    ports:
      - '${FORWARD_MAILPIT_PORT:-1025}:1025'
      - '127.0.0.1:${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
    # NF-DOCKER-002.
    restart: unless-stopped
    networks:
      - sail
    # NF-DOCKER-001: Healthcheck gegen /readyz.
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8025/readyz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
networks:
  sail:
    driver: bridge
volumes:
  sailmysql:
    driver: local
  sailredis:
    driver: local
  sailmeilisearch:
    driver: local
