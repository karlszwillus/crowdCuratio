[PHP]
post_max_size = 100M
upload_max_filesize = 100M
variables_order = EGPCS

; PCOV-Konfiguration für Test-Coverage. Der Driver wird nur dann
; aktiv, wenn Pest/PHPUnit mit `--coverage` aufgerufen werden — sonst
; null Overhead im normalen App-Lauf. Scope auf /var/www/html/app,
; damit weder vendor/ noch tests/ in die Coverage-Bilanz wandern.
; Aufruf: `sail pest --coverage` oder `sail composer test-coverage`.
[pcov]
pcov.enabled = 1
pcov.directory = /var/www/html/app
