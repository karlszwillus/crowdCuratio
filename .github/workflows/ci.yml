name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancelt einen laufenden Workflow, wenn ein neuer Push auf den
# gleichen Branch kommt. Spart Runner-Zeit auf aktiven Feature-Branches.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Pest (PHP 8.1, SQLite)
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          # 8.1 entspricht dem Container-PHP aus docker/8.1/Dockerfile
          # (Phase 1, Commit adcb538). 8.4 ist Phase-3-Ziel — bis dahin
          # spiegelt CI die Produktiv-Version.
          php-version: '8.1'
          extensions: mbstring, dom, fileinfo, sqlite, pdo_sqlite, intl, zip, bcmath, gd
          coverage: none
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-8.1-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.1-composer-

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run Pest
        # SQLite-In-Memory wird hier zur Laufzeit gesetzt, nicht in
        # phpunit.xml — so bleibt Karls lokaler Pest-Lauf (gegen die
        # Sail-MySQL) unverändert. NF-DB-103 (drei MySQL-only-Migrations)
        # ist hier abgedeckt: die Migrations prüfen selbst auf den
        # Driver und werden auf SQLite zum No-Op.
        env:
          DB_CONNECTION: sqlite
          DB_DATABASE: ':memory:'
        run: ./vendor/bin/pest --colors=always

  composer-audit:
    name: composer audit
    runs-on: ubuntu-22.04
    # Phase-2-Strategie: Audit läuft, soll aber den Build (noch) nicht
    # brechen. Ergebnisse fließen in audit-baseline.txt, harter Fail
    # wird in Block G aktiviert. Die meisten heutigen CVEs sind aus
    # dem Laravel-8-Umfeld und gehen mit dem Upgrade in Phase 3 weg.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          tools: composer:v2
          coverage: none

      - name: Composer audit (production deps only)
        run: composer audit --no-dev --locked --format=plain

  npm-audit:
    name: npm audit
    runs-on: ubuntu-22.04
    # Gleiche Soft-Fail-Strategie wie composer-audit. Hinweis: bei
    # crowdCuratio liegen axios und alpinejs in devDependencies, weil
    # Laravel-Mix sie zur Buildzeit konsumiert — `--omit=dev` blendet
    # die also aus. Das volle CVE-Bild kommt mit Phase 5 (Mix → Vite,
    # axios/alpine-Upgrade).
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: npm audit (production deps, high+ severity)
        run: npm audit --omit=dev --audit-level=high

  larastan:
    name: Larastan (Level 5)
    runs-on: ubuntu-22.04
    # Soft-Fail bis Karl die Baseline einmal lokal generiert
    # (`./vendor/bin/sail phpstan analyse --generate-baseline`). Ab
    # dann zählt nur das Delta — und Larastan kann auf Hard-Fail
    # umgestellt werden.
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: mbstring, dom, fileinfo, intl, zip, bcmath, gd
          coverage: none
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-8.1-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.1-composer-

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run Larastan
        # --memory-limit=2G ist für Laravel-Projekte mit vielen Traits
        # eine empfohlene Schmerz­grenze (Larastan-Doku).
        run: ./vendor/bin/phpstan analyse --memory-limit=2G --no-progress

  pint:
    name: Pint (Laravel preset)
    runs-on: ubuntu-22.04
    # Soft-Fail bis Block B.10 (Pint-Baseline-Sweep) gelaufen ist —
    # vorher ist der Bestandscode noch nicht konform. Sobald der
    # Sweep-Commit drin ist, wird hier auf Hard-Fail umgestellt (im
    # selben Commit).
    continue-on-error: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP 8.1
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          coverage: none
          tools: composer:v2

      - name: Get composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-php-8.1-composer-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php-8.1-composer-

      - name: Install composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction

      - name: Run Pint (check mode, diff)
        # --test bricht bei Verstößen ab, statt zu fixen.
        # --diff zeigt im CI-Log konkret, was geändert würde.
        run: ./vendor/bin/pint --test
